# Render Blueprint -- one-click deploy of Margin IQ as a single web service
# (FastAPI serving both the API and the built React portal).
#
# The database is SQLite stored on a Render persistent disk mounted at /data,
# so no external database service is needed. Note: persistent disks require a
# paid instance type (the free plan has no disk -- data there is wiped on every
# deploy/restart, which is fine for a throwaway demo but not a real engagement).
#
# SEED_DEMO=true seeds the Snakes & Lattes engagement demo tenant on first boot (only when
# the database is empty -- it never touches existing data). The portal's
# default token matches the seeded tenant, so the deployed app is demoable
# immediately. Set it to false for a real engagement.

services:
  - type: web
    name: margin-iq
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    disk:
      name: margin-iq-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SQLITE_PATH
        value: /data/margin_iq.db
      - key: SEED_DEMO
        value: "true"
      - key: CORS_ORIGINS
        value: "http://localhost:5173" # same-origin in prod; only dev needs CORS
