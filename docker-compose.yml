services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SQLITE_PATH: /data/margin_iq.db
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./backend:/app
      - sqlite_data:/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  sqlite_data:
