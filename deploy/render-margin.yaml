services:
  - type: web
    name: margin-iq
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    disk:
      name: margin-iq-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SQLITE_PATH
        value: /data/margin_iq.db
      - key: PRODUCT_MODE
        value: margin
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SEED_DEMO
        value: "true"
      - key: CORS_ORIGINS
        value: "http://localhost:5173"
