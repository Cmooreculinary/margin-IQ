services:
  - type: web
    name: supply-agent
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    disk:
      name: supply-agent-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SQLITE_PATH
        value: /data/supply_agent.db
      - key: PRODUCT_MODE
        value: supply
      - key: SEED_DEMO
        value: "true"
      - key: CORS_ORIGINS
        value: "http://localhost:5173"
