# Default BCA IQ Suite deployment. The same Docker image can also run either
# product independently by setting PRODUCT_MODE to "margin" or "supply".
services:
  - type: web
    name: bca-iq-suite
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    disk:
      name: bca-iq-suite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SQLITE_PATH
        value: /data/bca_iq_suite.db
      - key: PRODUCT_MODE
        value: suite
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SEED_DEMO
        value: "true"
      - key: CORS_ORIGINS
        value: "http://localhost:5173"
